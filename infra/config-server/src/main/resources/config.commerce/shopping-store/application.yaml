spring:
  application:
    name: shopping-store
  datasource:
    url: jdbc:postgresql://localhost:5432/shopping-store
    username: shopping-store
    password: shopping-store
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

logging:
  level:
    ru.yandex.practicum: DEBUG